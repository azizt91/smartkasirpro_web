<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Processing - POS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#13ec13",
              "primary-dark": "#0eb80e", 
              "background-light": "#f6f8f6",
              "background-dark": "#102210",
              "surface-light": "#ffffff",
              "surface-dark": "#1a331a",
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
              'glow': '0 0 15px rgba(19, 236, 19, 0.3)',
            }
          },
        },
      }
    </script>
<style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center p-0 sm:p-4">
<!-- Mobile Container -->
<main class="w-full max-w-md h-[100dvh] sm:h-auto sm:min-h-[800px] bg-background-light dark:bg-background-dark sm:rounded-2xl sm:shadow-2xl overflow-hidden flex flex-col relative">
<!-- Header / Navigation -->
<header class="px-6 pt-12 pb-4 flex items-center justify-between z-10">
<button class="p-2 -ml-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-icons-round text-slate-600 dark:text-slate-300">arrow_back_ios_new</span>
</button>
<h1 class="text-sm font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Checkout</h1>
<button class="p-2 -mr-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-icons-round text-slate-600 dark:text-slate-300">more_vert</span>
</button>
</header>
<!-- Main Content Area -->
<div class="flex-1 overflow-y-auto no-scrollbar pb-32">
<!-- Total Bill Section -->
<section class="px-6 py-6 text-center">
<p class="text-sm font-semibold text-slate-400 dark:text-slate-500 mb-2">Total Tagihan</p>
<div class="relative inline-block">
<h2 class="text-5xl font-extrabold text-slate-900 dark:text-white tracking-tight">Rp 150.000</h2>
<!-- Subtle decorative glow behind price -->
<div class="absolute inset-0 bg-primary/20 blur-3xl -z-10 rounded-full scale-150"></div>
</div>
</section>
<!-- Payment Method Selector -->
<section class="px-6 mb-8">
<h3 class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3">Metode Pembayaran</h3>
<div class="grid grid-cols-4 gap-3">
<!-- Cash (Selected) -->
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-surface-light dark:bg-surface-dark border-2 border-primary shadow-glow transition-all duration-200 group relative overflow-hidden">
<div class="absolute inset-0 bg-primary/10"></div>
<span class="material-icons-round text-3xl text-primary-dark dark:text-primary mb-1">payments</span>
<span class="text-[10px] font-bold text-primary-dark dark:text-primary">Tunai</span>
<!-- Checkmark badge -->
<div class="absolute top-1 right-1 w-4 h-4 bg-primary rounded-full flex items-center justify-center">
<span class="material-icons-round text-white text-[10px] font-bold">check</span>
</div>
</button>
<!-- QRIS -->
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600 transition-all opacity-60 grayscale hover:grayscale-0 hover:opacity-100">
<span class="material-icons-round text-3xl text-slate-600 dark:text-slate-300 mb-1">qr_code_scanner</span>
<span class="text-[10px] font-medium text-slate-500 dark:text-slate-400">QRIS</span>
</button>
<!-- Transfer -->
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600 transition-all opacity-60 grayscale hover:grayscale-0 hover:opacity-100">
<span class="material-icons-round text-3xl text-slate-600 dark:text-slate-300 mb-1">account_balance</span>
<span class="text-[10px] font-medium text-slate-500 dark:text-slate-400">Transfer</span>
</button>
<!-- E-Wallet -->
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600 transition-all opacity-60 grayscale hover:grayscale-0 hover:opacity-100">
<span class="material-icons-round text-3xl text-slate-600 dark:text-slate-300 mb-1">account_balance_wallet</span>
<span class="text-[10px] font-medium text-slate-500 dark:text-slate-400">E-Wallet</span>
</button>
</div>
</section>
<!-- Cash Input Module -->
<section class="px-6">
<div class="bg-white dark:bg-surface-dark p-5 rounded-2xl shadow-soft border border-slate-100 dark:border-slate-800">
<!-- Input Field -->
<label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-2">Uang Diterima</label>
<div class="relative mb-5 group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="text-slate-400 font-bold text-lg">Rp</span>
</div>
<input class="w-full bg-slate-50 dark:bg-background-dark text-slate-900 dark:text-white text-2xl font-bold py-3 pl-12 pr-4 rounded-xl border-2 border-transparent focus:border-primary focus:ring-0 focus:bg-white dark:focus:bg-surface-dark transition-all placeholder-slate-300" placeholder="0" type="text" value="200.000"/>
<button class="absolute inset-y-0 right-2 px-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
<span class="material-icons-round text-xl">close</span>
</button>
</div>
<!-- Quick Amounts -->
<div class="grid grid-cols-4 gap-2 mb-6">
<button class="py-2 px-1 rounded-lg border border-slate-200 dark:border-slate-700 text-xs font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-background-dark hover:border-primary/50 transition-colors">Uang Pas</button>
<button class="py-2 px-1 rounded-lg border border-slate-200 dark:border-slate-700 text-xs font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-background-dark hover:border-primary/50 transition-colors">50k</button>
<button class="py-2 px-1 rounded-lg border border-slate-200 dark:border-slate-700 text-xs font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-background-dark hover:border-primary/50 transition-colors">100k</button>
<button class="py-2 px-1 rounded-lg bg-primary/10 border border-primary text-xs font-bold text-primary-dark dark:text-primary transition-colors">200k</button>
</div>
<!-- Change Calculation -->
<div class="flex items-center justify-between pt-4 border-t border-slate-100 dark:border-slate-700 border-dashed">
<span class="text-sm font-medium text-slate-500">Kembalian</span>
<span class="text-xl font-bold text-primary-dark dark:text-primary">Rp 50.000</span>
</div>
</div>
</section>
</div>
<!-- Footer Actions -->
<footer class="absolute bottom-0 left-0 right-0 bg-background-light dark:bg-background-dark/90 backdrop-blur-md px-6 py-6 border-t border-slate-200 dark:border-slate-800 z-20">
<div class="flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary-dark text-black dark:text-black font-bold text-lg py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
<span>Konfirmasi Pembayaran</span>
<span class="material-icons-round group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<button class="w-full bg-transparent border-2 border-red-100 dark:border-red-900/30 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 font-bold text-base py-3 rounded-xl transition-colors">
                    Batal
                </button>
</div>
</footer>
</main>
</body></html>
